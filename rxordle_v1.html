<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rxordle — Guess the medication</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#132A4C;
    --navy-deep:#0E2038;
    --ink:#16233F;
    --page-bg:#EEF2F8;
    --card:#FFFFFF;
    --clue-bg:#E9F1FB;
    --clue-border:#D2E1F4;
    --clue-num-bg:#DCEAFB;
    --teal:#1E9C86;
    --teal-dark:#0F6E5C;
    --teal-tint:#E1F5EE;
    --muted:#5B6B82;
    --success-bg:#E4F3E4;
    --success-text:#1F6D3A;
    --success-border:#BEE0C2;
    --fail-bg:#FBE9E9;
    --fail-text:#8C2A2A;
    --fail-border:#F0C6C6;
    --wrong-bg:#FBEDED;
    --wrong-text:#8C2A2A;
    --border:#E3E8F0;
    --shadow: 0 1px 3px rgba(19,42,76,0.06), 0 8px 24px rgba(19,42,76,0.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--page-bg);
    font-family:'Inter',sans-serif;
    color:var(--ink);
    min-height:100vh;
    padding-bottom:3rem;
  }
  .topbar{
    background:linear-gradient(180deg,var(--navy) 0%, var(--navy-deep) 100%);
    padding:1.1rem 1rem;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:0.6rem;
  }
  .topbar h1{
    font-family:'Lora',serif;
    font-weight:700;
    font-size:1.7rem;
    color:#fff;
    margin:0;
    letter-spacing:0.01em;
  }
  .topbar .rx-mark{
    width:32px;height:32px;border-radius:50%;
    background:var(--teal);
    display:flex;align-items:center;justify-content:center;
    font-family:'Lora',serif;font-weight:700;color:#0E2038;font-size:1.1rem;
    flex-shrink:0;
  }
  .wrap{
    max-width:620px;
    margin:0 auto;
    padding:1.75rem 1rem 0;
  }
  .tabs{
    display:flex;
    gap:0.4rem;
    justify-content:center;
    margin-bottom:1rem;
  }
  .tab-btn{
    padding:0.45rem 1.1rem;
    border-radius:20px;
    border:1.5px solid var(--border);
    background:#fff;
    color:var(--muted);
    font-weight:600;
    font-size:0.85rem;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .tab-btn.active{
    background:var(--navy);
    color:#fff;
    border-color:var(--navy);
  }
  .card{
    background:var(--card);
    border-radius:18px;
    box-shadow:var(--shadow);
    padding:1.75rem 1.5rem 2rem;
  }
  .card h2{
    font-family:'Lora',serif;
    text-align:center;
    font-size:1.5rem;
    margin:0 0 0.4rem;
    color:var(--navy);
    font-weight:600;
  }
  .subrule{
    width:52px;height:3px;background:var(--teal);
    margin:0 auto 1.3rem;
    border-radius:2px;
  }
  .daytag{
    text-align:center;
    font-size:0.78rem;
    color:var(--muted);
    margin:-0.8rem 0 1.2rem;
    font-family:'JetBrains Mono',monospace;
    letter-spacing:0.02em;
  }
  /* pill progress */
  .pillrow{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-bottom:1.4rem;
  }
  .pillseg{
    width:38px;height:16px;
    border-radius:9px;
    background:#DCE3EE;
    position:relative;
    overflow:hidden;
    border:1px solid #CBD5E4;
  }
  .pillseg::after{
    content:'';
    position:absolute;
    left:0;top:0;bottom:0;
    width:50%;
    background:rgba(255,255,255,0.55);
  }
  .pillseg.used{background:var(--teal);border-color:var(--teal-dark);}
  .pillseg.current{background:#B9D3F5;border-color:#7FAADF; box-shadow:0 0 0 3px rgba(31,156,134,0.18);}

  .clue{
    background:var(--clue-bg);
    border:1px solid var(--clue-border);
    border-radius:12px;
    padding:0.85rem 1.1rem;
    margin-bottom:0.65rem;
    font-size:0.97rem;
    line-height:1.45;
    display:flex;
    gap:0.7rem;
    align-items:flex-start;
    animation:fadeIn 0.35s ease;
  }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(-4px);} to{opacity:1; transform:translateY(0);} }
  .clue .num{
    flex-shrink:0;
    width:24px;height:24px;
    border-radius:50%;
    background:var(--clue-num-bg);
    color:var(--navy);
    font-weight:700;
    font-size:0.8rem;
    display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;
    margin-top:0.05rem;
  }
  .clue .label{
    display:block;
    font-size:0.68rem;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--teal-dark);
    font-weight:700;
    margin-bottom:0.15rem;
  }
  .clue p{margin:0;color:var(--ink);}

  .guessrow{
    display:flex;
    gap:0.5rem;
    margin-top:1.3rem;
    position:relative;
  }
  .combo{
    position:relative;
    flex:1;
  }
  .combo input{
    width:100%;
    padding:0.65rem 0.8rem;
    border:1.5px solid var(--border);
    border-radius:10px;
    font-size:0.95rem;
    font-family:'Inter',sans-serif;
    outline:none;
    background:#FBFCFE;
    color:var(--ink);
  }
  .combo input:focus{ border-color:var(--teal); }
  .combo input:disabled{ background:#F1F3F6; color:var(--muted); }
  .suggestions{
    position:absolute;
    top:calc(100% + 4px);
    left:0; right:0;
    background:#fff;
    border:1px solid var(--border);
    border-radius:10px;
    box-shadow:var(--shadow);
    max-height:220px;
    overflow-y:auto;
    z-index:10;
    display:none;
  }
  .suggestions.open{display:block;}
  .suggestions div{
    padding:0.55rem 0.8rem;
    font-size:0.9rem;
    cursor:pointer;
  }
  .suggestions div:hover, .suggestions div.hl{ background:var(--teal-tint); }
  .guessbtn{
    padding:0.65rem 1.15rem;
    border:none;
    border-radius:10px;
    background:var(--navy);
    color:#fff;
    font-weight:600;
    font-size:0.92rem;
    cursor:pointer;
    font-family:'Inter',sans-serif;
    white-space:nowrap;
  }
  .guessbtn:hover{ background:var(--navy-deep); }
  .guessbtn:disabled{ background:#AEB8C6; cursor:not-allowed; }

  .hint{
    font-size:0.78rem;
    color:var(--muted);
    margin-top:0.4rem;
    min-height:1.1em;
  }
  .hint.err{ color:var(--fail-text); }

  .history{
    margin-top:1.1rem;
  }
  .history-title{
    font-size:0.75rem;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--muted);
    font-weight:700;
    margin-bottom:0.5rem;
  }
  .guess-item{
    display:flex;
    align-items:center;
    gap:0.55rem;
    background:var(--wrong-bg);
    border:1px solid var(--fail-border);
    color:var(--wrong-text);
    padding:0.45rem 0.75rem;
    border-radius:8px;
    font-size:0.88rem;
    margin-bottom:0.4rem;
    font-weight:500;
  }
  .guess-item .x{
    font-weight:700;
    font-size:0.85rem;
  }

  .banner{
    margin-top:1.2rem;
    border-radius:12px;
    padding:0.95rem 1.1rem;
    text-align:center;
    font-weight:600;
    font-size:0.98rem;
  }
  .banner.win{ background:var(--success-bg); color:var(--success-text); border:1px solid var(--success-border); }
  .banner.lose{ background:var(--fail-bg); color:var(--fail-text); border:1px solid var(--fail-border); }
  .banner .sub{
    display:block;
    font-weight:400;
    font-size:0.85rem;
    margin-top:0.25rem;
    color:inherit;
    opacity:0.85;
  }

  .share-wrap{ margin-top:0.9rem; }
  .share-box{
    width:100%;
    resize:none;
    border:1px solid var(--border);
    border-radius:10px;
    padding:0.75rem;
    font-family:'JetBrains Mono',monospace;
    font-size:0.82rem;
    color:var(--ink);
    background:#FBFCFE;
    line-height:1.5;
  }
  .copybtn{
    margin-top:0.5rem;
    width:100%;
    padding:0.6rem;
    border:none;
    border-radius:10px;
    background:var(--teal);
    color:#fff;
    font-weight:600;
    font-size:0.9rem;
    cursor:pointer;
  }
  .copybtn:hover{ background:var(--teal-dark); }
  .copybtn.copied{ background:var(--teal-dark); }

  .footer-note{
    text-align:center;
    color:var(--muted);
    font-size:0.76rem;
    margin-top:1rem;
  }

  /* Archive */
  .archive-list{
    display:flex;
    flex-direction:column;
    gap:0.5rem;
    max-height:420px;
    overflow-y:auto;
  }
  .archive-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0.7rem 0.95rem;
    border:1px solid var(--border);
    border-radius:10px;
    cursor:pointer;
    background:#FBFCFE;
  }
  .archive-item:hover{ border-color:var(--teal); }
  .archive-item .adate{
    font-weight:600;
    font-size:0.9rem;
    color:var(--ink);
  }
  .archive-item .astatus{
    font-size:0.75rem;
    font-weight:700;
    padding:0.2rem 0.6rem;
    border-radius:20px;
  }
  .astatus.solved{ background:var(--success-bg); color:var(--success-text); }
  .astatus.failed{ background:var(--fail-bg); color:var(--fail-text); }
  .astatus.unplayed{ background:#EEF1F6; color:var(--muted); }

  /* Modal */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(14,32,56,0.55);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:1rem;
  }
  .modal-overlay.open{ display:flex; }
  .modal-box{
    background:#fff;
    border-radius:18px;
    max-width:420px;
    width:100%;
    padding:1.8rem 1.6rem 1.6rem;
    box-shadow:0 20px 60px rgba(14,32,56,0.35);
    text-align:center;
    animation:popIn 0.25s ease;
    position:relative;
    max-height:85vh;
    overflow-y:auto;
  }
  @keyframes popIn{ from{ opacity:0; transform:scale(0.92); } to{ opacity:1; transform:scale(1); } }
  .modal-box .modal-icon{
    width:56px;height:56px;
    border-radius:50%;
    margin:0 auto 0.8rem;
    display:flex;align-items:center;justify-content:center;
    font-size:1.6rem;
  }
  .modal-box.win .modal-icon{ background:var(--success-bg); color:var(--success-text); }
  .modal-box.lose .modal-icon{ background:var(--fail-bg); color:var(--fail-text); }
  .modal-box h3{
    font-family:'Lora',serif;
    font-size:1.3rem;
    margin:0 0 0.35rem;
    color:var(--navy);
  }
  .modal-box p{
    font-size:0.92rem;
    color:var(--muted);
    margin:0 0 0.9rem;
  }
  .modal-close{
    position:absolute;
    top:0.8rem; right:0.9rem;
    background:none;
    border:none;
    font-size:1.1rem;
    color:var(--muted);
    cursor:pointer;
    line-height:1;
  }
  .modal-continue{
    margin-top:0.9rem;
    width:100%;
    padding:0.6rem;
    border:none;
    border-radius:10px;
    background:var(--navy);
    color:#fff;
    font-weight:600;
    font-size:0.9rem;
    cursor:pointer;
  }
  .modal-continue:hover{ background:var(--navy-deep); }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background:#CBD5E4; border-radius:4px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="rx-mark">℞</div>
  <h1>Rxordle</h1>
</div>

<div class="wrap">
  <div class="tabs">
    <button class="tab-btn active" id="tabToday">Today</button>
    <button class="tab-btn" id="tabArchive">Archive</button>
  </div>

  <div class="card" id="gameCard">
    <h2 id="cardTitle">What's the medication?</h2>
    <div class="subrule"></div>
    <div class="daytag" id="daytag"></div>

    <div class="pillrow" id="pillrow"></div>

    <div id="clues"></div>

    <div class="guessrow" id="guessrow">
      <div class="combo">
        <input type="text" id="guessInput" placeholder="Start typing a medication..." autocomplete="off" />
        <div class="suggestions" id="suggestions"></div>
      </div>
      <button class="guessbtn" id="guessBtn">Guess</button>
    </div>
    <div class="hint" id="hintText"></div>

    <div class="history" id="historyWrap" style="display:none;">
      <div class="history-title">Previous guesses</div>
      <div id="historyList"></div>
    </div>

    <div id="bannerWrap"></div>

    <div class="footer-note" id="footerNote">New medication every day at midnight, local time.</div>
  </div>

  <div class="card" id="archiveCard" style="display:none;">
    <h2>Archive</h2>
    <div class="subrule"></div>
    <div class="archive-list" id="archiveList"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBox">
    <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
    <div class="modal-icon" id="modalIcon"></div>
    <h3 id="modalTitle"></h3>
    <p id="modalSub"></p>
    <div id="modalShareWrap"></div>
    <button class="modal-continue" id="modalContinue">Continue</button>
  </div>
</div>

<script>
const DRUGS = [
  { name:"Lisinopril", cls:"ACE inhibitor", clues:[
    "This medication is commonly prescribed to a middle-aged patient with newly diagnosed high blood pressure or heart failure.",
    "It belongs to a drug class frequently used as a first-line agent for hypertension and for patients with diabetic kidney disease.",
    "It works by blocking the conversion of angiotensin I to angiotensin II, reducing vasoconstriction and aldosterone release.",
    "A hallmark side effect is a dry, persistent cough caused by increased bradykinin levels.",
    "Clinicians monitor potassium and creatinine after starting this drug, and it carries a black box warning against use in pregnancy.",
    "Its generic name ends in '-pril' and it is one of the most prescribed antihypertensives in the United States." ]},
  { name:"Atorvastatin", cls:"HMG-CoA reductase inhibitor (statin)", clues:[
    "This medication is often started in a patient with elevated LDL cholesterol or a history of cardiovascular disease.",
    "It belongs to the statin class, used for primary and secondary prevention of atherosclerotic disease.",
    "It works by inhibiting HMG-CoA reductase, the rate-limiting enzyme in hepatic cholesterol synthesis.",
    "Muscle aches (myalgia) are a commonly reported side effect, and liver enzymes are monitored during therapy.",
    "It carries a rare risk of rhabdomyolysis, especially when combined with certain other drugs metabolized by CYP3A4.",
    "Its generic name ends in '-statin' and it is sold under the brand name Lipitor." ]},
  { name:"Metformin", cls:"Biguanide", clues:[
    "This medication is typically the first drug prescribed to an overweight adult newly diagnosed with type 2 diabetes.",
    "It belongs to the biguanide class and is considered first-line therapy for type 2 diabetes.",
    "It works primarily by decreasing hepatic glucose production and improving peripheral insulin sensitivity.",
    "Gastrointestinal upset, including diarrhea and nausea, is a very common side effect, especially when starting therapy.",
    "It carries a rare but serious risk of lactic acidosis, particularly in patients with renal impairment, and is often held before contrast imaging.",
    "It does not cause hypoglycemia on its own and is often taken with meals, twice daily, in extended-release or immediate-release form." ]},
  { name:"Levothyroxine", cls:"Thyroid hormone replacement", clues:[
    "This medication is prescribed to a patient with fatigue, weight gain, cold intolerance, and constipation.",
    "It belongs to the thyroid hormone replacement class and is used to treat hypothyroidism.",
    "It works by replacing the body's natural thyroxine, restoring normal metabolic rate.",
    "Symptoms of overdose mimic hyperthyroidism, including palpitations, anxiety, and weight loss.",
    "TSH levels are monitored roughly six to eight weeks after any dose change, and it should be taken on an empty stomach.",
    "It is one of the most prescribed medications in the United States and is often taken for life." ]},
  { name:"Amlodipine", cls:"Dihydropyridine calcium channel blocker", clues:[
    "This medication is prescribed to a patient with hypertension or chronic stable angina.",
    "It belongs to the dihydropyridine calcium channel blocker class.",
    "It works by blocking L-type calcium channels in vascular smooth muscle, causing vasodilation.",
    "Peripheral edema, particularly of the ankles, is a common side effect.",
    "It has a long half-life allowing once-daily dosing and can cause gingival hyperplasia in some patients.",
    "Its generic name ends in '-dipine' and it is often paired with an ACE inhibitor in combination pills." ]},
  { name:"Metoprolol", cls:"Beta-1 selective blocker", clues:[
    "This medication is prescribed to a patient recovering from a heart attack or with atrial fibrillation.",
    "It belongs to the beta-blocker class, selective for beta-1 receptors.",
    "It works by blocking beta-1 adrenergic receptors, slowing heart rate and reducing myocardial oxygen demand.",
    "Fatigue, bradycardia, and cold extremities are common side effects.",
    "It should never be abruptly discontinued due to risk of rebound tachycardia and hypertension.",
    "It comes in both a tartrate (twice daily) and succinate (once daily, extended-release) salt form." ]},
  { name:"Omeprazole", cls:"Proton pump inhibitor", clues:[
    "This medication is prescribed to a patient with heartburn, GERD, or a history of peptic ulcer disease.",
    "It belongs to the proton pump inhibitor class.",
    "It works by irreversibly inhibiting the H+/K+ ATPase pump in gastric parietal cells.",
    "Long-term use is associated with increased fracture risk and vitamin B12 deficiency.",
    "It also carries a long-term risk of hypomagnesemia and increased susceptibility to Clostridioides difficile infection.",
    "Its generic name ends in '-prazole' and it is taken thirty to sixty minutes before the first meal of the day." ]},
  { name:"Losartan", cls:"Angiotensin II receptor blocker (ARB)", clues:[
    "This medication is prescribed to a patient with hypertension who cannot tolerate an ACE inhibitor.",
    "It belongs to the angiotensin receptor blocker class.",
    "It works by directly blocking the AT1 receptor, preventing the action of angiotensin II.",
    "Unlike a related drug class, it does not typically cause a dry cough.",
    "It requires monitoring of potassium and renal function and is contraindicated in pregnancy.",
    "Its generic name ends in '-sartan' and it is sold under the brand name Cozaar." ]},
  { name:"Albuterol", cls:"Short-acting beta-2 agonist (SABA)", clues:[
    "This medication is used by a patient experiencing wheezing, shortness of breath, or an acute asthma exacerbation.",
    "It belongs to the short-acting beta-2 agonist bronchodilator class.",
    "It works by stimulating beta-2 adrenergic receptors in bronchial smooth muscle, causing bronchodilation.",
    "Tremor and tachycardia are common side effects due to some beta-1 cross-reactivity.",
    "It is used as a rescue inhaler rather than for daily maintenance, and overuse can signal poorly controlled asthma.",
    "It is often delivered via a metered-dose inhaler and is also known by the brand name ProAir or Ventolin." ]},
  { name:"Gabapentin", cls:"Gabapentinoid (anticonvulsant)", clues:[
    "This medication is prescribed to a patient with diabetic neuropathy, postherpetic neuralgia, or as an adjunct anticonvulsant.",
    "It belongs to the gabapentinoid class, structurally related to GABA but not acting on GABA receptors.",
    "It works by binding the alpha-2-delta subunit of voltage-gated calcium channels, reducing neurotransmitter release.",
    "Drowsiness, dizziness, and peripheral edema are common side effects.",
    "It is increasingly monitored as a controlled substance in some states due to its potential for misuse when combined with opioids.",
    "It requires dose adjustment based on renal function and is not metabolized by the liver." ]},
  { name:"Hydrochlorothiazide", cls:"Thiazide diuretic", clues:[
    "This medication is prescribed to a patient with mild hypertension or fluid retention.",
    "It belongs to the thiazide diuretic class.",
    "It works by inhibiting sodium reabsorption in the distal convoluted tubule.",
    "It commonly causes hypokalemia and can raise blood glucose and uric acid levels.",
    "It can also cause hyponatremia, especially in older adults, and increases photosensitivity.",
    "It is often abbreviated 'HCTZ' and is a common component of combination antihypertensive pills." ]},
  { name:"Sertraline", cls:"Selective serotonin reuptake inhibitor (SSRI)", clues:[
    "This medication is prescribed to a patient with major depressive disorder or an anxiety disorder.",
    "It belongs to the SSRI antidepressant class.",
    "It works by blocking the reuptake of serotonin at the presynaptic neuron, increasing synaptic serotonin.",
    "Nausea and sexual dysfunction are commonly reported side effects.",
    "It carries a boxed warning for increased suicidal thinking in young adults, and abrupt discontinuation can cause a withdrawal syndrome.",
    "It is sold under the brand name Zoloft and is often a first-line choice for postpartum depression." ]},
  { name:"Furosemide", cls:"Loop diuretic", clues:[
    "This medication is used for a patient with fluid overload from heart failure or significant peripheral edema.",
    "It belongs to the loop diuretic class.",
    "It works by inhibiting the Na-K-2Cl cotransporter in the thick ascending limb of the loop of Henle.",
    "It commonly causes hypokalemia, hypotension, and ototoxicity at high doses.",
    "It is often used intravenously in acute decompensated heart failure for rapid diuresis, unlike weaker oral diuretics.",
    "It is sold under the brand name Lasix, a name referencing that it 'lasts six' hours of diuresis." ]},
  { name:"Amoxicillin", cls:"Aminopenicillin antibiotic", clues:[
    "This medication is prescribed to a child with acute otitis media or a patient with strep throat.",
    "It belongs to the penicillin class of antibiotics.",
    "It works by inhibiting bacterial cell wall synthesis via binding to penicillin-binding proteins.",
    "Diarrhea and a hypersensitivity rash are commonly reported, and it should be avoided in patients with a penicillin allergy.",

    "It is one of the most commonly prescribed antibiotics in pediatrics and comes as a chewable tablet or suspension." ]},
  { name:"Prednisone", cls:"Corticosteroid", clues:[
    "This medication is prescribed to a patient with a COPD exacerbation, autoimmune flare, or severe allergic reaction.",
    "It belongs to the systemic corticosteroid class.",
    "It works by binding glucocorticoid receptors, broadly suppressing inflammation and immune activity.",
    "Weight gain, mood changes, and elevated blood glucose are common side effects with use.",
    "Long courses require a taper to avoid adrenal insufficiency, since the drug suppresses the hypothalamic-pituitary-adrenal axis.",
    "It is inactive until converted to prednisolone by the liver and is commonly given as a short 'burst' pack." ]},
  { name:"Escitalopram", cls:"Selective serotonin reuptake inhibitor (SSRI)", clues:[
    "This medication is prescribed to a patient with generalized anxiety disorder or major depressive disorder.",
    "It belongs to the SSRI antidepressant class.",
    "It works by selectively inhibiting serotonin reuptake, increasing serotonergic neurotransmission.",
    "Nausea, insomnia, and sexual side effects are commonly reported.",
    "It has one of the more favorable side effect and drug interaction profiles among SSRIs, and QT prolongation is a dose-related risk.",
    "It is the more potent, purified enantiomer of an older antidepressant and is sold as Lexapro." ]},
  { name:"Bupropion", cls:"Norepinephrine-dopamine reuptake inhibitor", clues:[

const DRUG_NAMES = DRUGS.map(d => d.name);

// ---------- Storage helper: uses Claude's window.storage when available,
// falls back to localStorage when this file is hosted as a plain website ----------
const hasClaudeStorage = (typeof window !== 'undefined' && !!window.storage);
const storageAdapter = {
  async get(key){
    if(hasClaudeStorage){
      try{ const r = await window.storage.get(key, false); return r ? r.value : null; }
      catch(e){ return null; }
    }
    try{ return window.localStorage.getItem(key); } catch(e){ return null; }
  },
  async set(key, value){
    if(hasClaudeStorage){
      try{ await window.storage.set(key, value, false); return true; }
      catch(e){ return false; }
    }
    try{ window.localStorage.setItem(key, value); return true; } catch(e){ return false; }
  }
};

// ---------- Date helpers ----------
function fmtDate(d){
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function todayStr(){ return fmtDate(new Date()); }
function hashStr(s){
  let h = 0;
  for(let i=0;i<s.length;i++){ h = (h<<5) - h + s.charCodeAt(i); h |= 0; }
  return Math.abs(h);
}
function drugForDate(dateStr){
  const idx = hashStr(dateStr) % DRUGS.length;
  return DRUGS[idx];
}
const TODAY = todayStr();
const ARCHIVE_DAYS = 30; // how many past days to list in the archive

// ---------- Active game context ----------
let ctx = {
  date: TODAY,
  drug: drugForDate(TODAY),
  state: { date: TODAY, guesses: [], status: 'playing' }
};

function storageKeyFor(dateStr){ return 'rxordle-state-' + dateStr; }

async function loadGame(dateStr){
  ctx.date = dateStr;
  ctx.drug = drugForDate(dateStr);
  ctx.state = { date: dateStr, guesses: [], status: 'playing' };
  const raw = await storageAdapter.get(storageKeyFor(dateStr));
  if(raw){
    try{
      const parsed = JSON.parse(raw);
      if(parsed && parsed.date === dateStr) ctx.state = parsed;
    }catch(e){ /* ignore corrupt state */ }
  }
  render();
}
async function saveGame(){
  await storageAdapter.set(storageKeyFor(ctx.date), JSON.stringify(ctx.state));
}

// Each drug's raw clues are authored in this order: [patient, class, mechanism, sideEffect, keyFact, reveal]
// CLUE_ORDER controls the order they're actually shown to the player, from vaguest to most specific.
// Patient/indication is often the single most diagnostic clue (e.g. "older man with weak urine stream" = tamsulosin,
// instantly), so it's pushed later instead of being the free first clue.
const CLUE_ORDER = [1, 3, 2, 0, 4, 5];
const labels = ["Class", "Side effect", "Mechanism", "Patient", "Key fact", "Reveal"];

function cluesShown(){
  return Math.min(6, Math.max(1, ctx.state.guesses.length + 1));
}

function formatDayLabel(dateStr){
  return new Date(dateStr+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
}

function render(){
  const isToday = ctx.date === TODAY;
  cardTitle.textContent = isToday ? "What's the medication?" : "What's the medication?";
  daytag.textContent = (isToday ? 'Today · ' : '') + formatDayLabel(ctx.date);
  footerNote.textContent = isToday
    ? 'New medication every day at midnight, local time.'
    : 'Playing an archived puzzle from ' + formatDayLabel(ctx.date) + '.';

  const shown = ctx.state.status === 'playing' ? cluesShown() : Math.min(6, Math.max(ctx.state.guesses.length,1));

  pillrowEl.innerHTML = '';
  for(let i=0;i<6;i++){
    const seg = document.createElement('div');
    seg.className = 'pillseg';
    if(i < shown - 1 || ctx.state.status !== 'playing') seg.classList.add('used');
    else if(i === shown - 1) seg.classList.add('current','used');
    pillrowEl.appendChild(seg);
  }

  cluesEl.innerHTML = '';
  for(let i=0;i<shown;i++){
    const div = document.createElement('div');
    div.className = 'clue';
    div.innerHTML = '<div class="num">'+(i+1)+'</div><div><span class="label">'+labels[i]+'</span><p>'+ctx.drug.clues[CLUE_ORDER[i]]+'</p></div>';
    cluesEl.appendChild(div);
  }

  if(ctx.state.guesses.length > 0){
    historyWrap.style.display = 'block';
    historyList.innerHTML = '';
    ctx.state.guesses.forEach(g => {
      const item = document.createElement('div');
      item.className = 'guess-item';
      item.innerHTML = '<span class="x">✕</span><span>'+g+'</span>';
      historyList.appendChild(item);
    });
  } else {
    historyWrap.style.display = 'none';
  }

  bannerWrap.innerHTML = '';
  guessInput.value = '';
  if(ctx.state.status === 'won'){
    guessrow.style.display = 'none';
    hintText.textContent = '';
    const usedClues = Math.min(6, ctx.state.guesses.length + 1);
    const banner = document.createElement('div');
    banner.className = 'banner win';
    banner.innerHTML = "You got it! It's <strong>"+ctx.drug.name+"</strong> ("+ctx.drug.cls+").<span class='sub'>Solved in "+usedClues+" of 6 clues.</span>";
    bannerWrap.appendChild(banner);
    bannerWrap.appendChild(buildShareBox(usedClues, true));
  } else if(ctx.state.status === 'lost'){
    guessrow.style.display = 'none';
    hintText.textContent = '';
    const banner = document.createElement('div');
    banner.className = 'banner lose';
    banner.innerHTML = "Out of clues. The answer was <strong>"+ctx.drug.name+"</strong> ("+ctx.drug.cls+").";
    bannerWrap.appendChild(banner);
    bannerWrap.appendChild(buildShareBox(6, false));
  } else {
    guessrow.style.display = 'flex';
  }
}

function shareText(dateStr, usedClues, won){
  let squares = '';
  for(let i=0;i<6;i++){
    if(i < usedClues - 1) squares += '\ud83d\udfe6';
    else if(i === usedClues - 1) squares += (won ? '\ud83d\udfe9' : '\u2b1b');
    else squares += '\u2b1c';
  }
  const scoreLine = won ? (usedClues+'/6') : 'X/6';
  return 'Rxordle '+dateStr+' \u2014 '+scoreLine+'\n'+squares+'\nCan you name the medication?';
}

function buildShareBox(usedClues, won){
  const wrapDiv = document.createElement('div');
  wrapDiv.className = 'share-wrap';
  const text = shareText(ctx.date, usedClues, won);
  const textarea = document.createElement('textarea');
  textarea.className = 'share-box';
  textarea.rows = 3;
  textarea.readOnly = true;
  textarea.value = text;
  const btn = document.createElement('button');
  btn.className = 'copybtn';
  btn.textContent = 'Copy to share';
  btn.onclick = () => {
    navigator.clipboard.writeText(text).then(()=>{
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(()=>{ btn.textContent='Copy to share'; btn.classList.remove('copied'); }, 1800);
    }).catch(()=>{
      textarea.select();
      document.execCommand('copy');
      btn.textContent = 'Copied!';
    });
  };
  wrapDiv.appendChild(textarea);
  wrapDiv.appendChild(btn);
  return wrapDiv;
}

// ---------- Result modal ----------
function showResultModal(won){
  const usedClues = won ? Math.min(6, ctx.state.guesses.length + 1) : 6;
  modalBox.className = 'modal-box ' + (won ? 'win' : 'lose');
  modalIcon.textContent = won ? '\u2713' : '\u2717';
  modalTitle.textContent = won ? 'Correct!' : 'Out of clues';
  modalSub.textContent = won
    ? "It's " + ctx.drug.name + " (" + ctx.drug.cls + "). Solved in " + usedClues + " of 6 clues."
    : "The answer was " + ctx.drug.name + " (" + ctx.drug.cls + ").";
  modalShareWrap.innerHTML = '';
  modalShareWrap.appendChild(buildShareBox(usedClues, won));
  modalOverlay.classList.add('open');
}
function hideModal(){ modalOverlay.classList.remove('open'); }
modalClose.addEventListener('click', hideModal);
modalContinue.addEventListener('click', hideModal);
modalOverlay.addEventListener('click', (e) => { if(e.target === modalOverlay) hideModal(); });

// ---------- Autocomplete ----------
let activeIndex = -1;

guessInput.addEventListener('input', () => {
  const q = guessInput.value.trim().toLowerCase();
  hintText.textContent = '';
  hintText.classList.remove('err');
  if(!q){ suggestions.classList.remove('open'); suggestions.innerHTML=''; return; }
  const matches = DRUG_NAMES.filter(n => n.toLowerCase().includes(q)).slice(0, 8);
  activeIndex = -1;
  if(matches.length === 0){
    suggestions.classList.remove('open');
    suggestions.innerHTML = '';
    return;
  }
  suggestions.innerHTML = '';
  matches.forEach((n) => {
    const div = document.createElement('div');
    div.textContent = n;
    div.onclick = () => {
      guessInput.value = n;
      suggestions.classList.remove('open');
      suggestions.innerHTML = '';
      guessInput.focus();
    };
    suggestions.appendChild(div);
  });
  suggestions.classList.add('open');
});

guessInput.addEventListener('keydown', (e) => {
  if(!suggestions.classList.contains('open')) {
    if(e.key === 'Enter'){ submitGuess(); }
    return;
  }
  const items = Array.from(suggestions.children);
  if(e.key === 'ArrowDown'){
    e.preventDefault();
    activeIndex = Math.min(items.length-1, activeIndex+1);
    updateHl(items);
  } else if(e.key === 'ArrowUp'){
    e.preventDefault();
    activeIndex = Math.max(0, activeIndex-1);
    updateHl(items);
  } else if(e.key === 'Enter'){
    e.preventDefault();
    if(activeIndex >= 0 && items[activeIndex]){
      guessInput.value = items[activeIndex].textContent;
      suggestions.classList.remove('open');
      suggestions.innerHTML = '';
    }
    submitGuess();
  } else if(e.key === 'Escape'){
    suggestions.classList.remove('open');
    suggestions.innerHTML = '';
  }
});
function updateHl(items){
  items.forEach((it,i) => it.classList.toggle('hl', i===activeIndex));
  if(items[activeIndex]) items[activeIndex].scrollIntoView({block:'nearest'});
}

document.addEventListener('click', (e) => {
  if(!e.target.closest('.combo')){
    suggestions.classList.remove('open');
    suggestions.innerHTML = '';
  }
});

guessBtn.addEventListener('click', submitGuess);

function submitGuess(){
  if(ctx.state.status !== 'playing') return;
  const raw = guessInput.value.trim();
  if(!raw){ return; }
  const match = DRUG_NAMES.find(n => n.toLowerCase() === raw.toLowerCase());
  if(!match){
    hintText.textContent = 'Select a medication from the list to guess.';
    hintText.classList.add('err');
    return;
  }
  if(ctx.state.guesses.some(g => g.toLowerCase() === match.toLowerCase())){
    hintText.textContent = 'You already tried that one.';
    hintText.classList.add('err');
    return;
  }
  hintText.textContent = '';
  hintText.classList.remove('err');

  let justFinished = null;
  if(match.toLowerCase() === ctx.drug.name.toLowerCase()){
    ctx.state.status = 'won';
    justFinished = true;
  } else {
    ctx.state.guesses.push(match);
    if(ctx.state.guesses.length >= 6){
      ctx.state.status = 'lost';
      justFinished = false;
    }
  }
  guessInput.value = '';
  suggestions.classList.remove('open');
  suggestions.innerHTML = '';
  saveGame();
  render();
  if(justFinished !== null){
    showResultModal(justFinished);
  }
}

// ---------- Tabs ----------
tabToday.addEventListener('click', () => {
  tabToday.classList.add('active');
  tabArchive.classList.remove('active');
  gameCard.style.display = 'block';
  archiveCard.style.display = 'none';
  loadGame(TODAY);
});
tabArchive.addEventListener('click', () => {
  tabArchive.classList.add('active');
  tabToday.classList.remove('active');
  gameCard.style.display = 'none';
  archiveCard.style.display = 'block';
  renderArchiveList();
});

async function renderArchiveList(){
  archiveList.innerHTML = '<div style="text-align:center; color:var(--muted); font-size:0.85rem; padding:1rem;">Loading past puzzles...</div>';
  const items = [];
  for(let i=1;i<=ARCHIVE_DAYS;i++){
    const d = new Date();
    d.setDate(d.getDate() - i);
    items.push(fmtDate(d));
  }
  const rows = await Promise.all(items.map(async (dateStr) => {
    const raw = await storageAdapter.get(storageKeyFor(dateStr));
    let status = 'unplayed';
    let label = 'Not played';
    if(raw){
      try{
        const parsed = JSON.parse(raw);
        if(parsed.status === 'won'){
          const used = Math.min(6, (parsed.guesses ? parsed.guesses.length : 0) + 1);
          status = 'solved';
          label = 'Completed in ' + used + (used === 1 ? ' guess' : ' guesses');
        }
        else if(parsed.status === 'lost'){ status = 'failed'; label = 'Failed (6/6)'; }
        else { status = 'unplayed'; label = 'In progress'; }
      }catch(e){}
    }
    return { dateStr, status, label };
  }));

  archiveList.innerHTML = '';
  rows.forEach(row => {
    const div = document.createElement('div');
    div.className = 'archive-item';
    div.innerHTML = '<span class="adate">'+formatDayLabel(row.dateStr)+'</span><span class="astatus '+row.status+'">'+row.label+'</span>';
    div.addEventListener('click', () => {
      tabToday.classList.remove('active');
      tabArchive.classList.add('active');
      gameCard.style.display = 'block';
      archiveCard.style.display = 'none';
      loadGame(row.dateStr);
    });
    archiveList.appendChild(div);
  });
}
