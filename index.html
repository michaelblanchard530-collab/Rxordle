<meta name="twitter:card" content="summary_large_image">

<meta name="twitter:description" content="A daily medication-guessing game for healthcare professionals. Six clues, one drug. How fast can you name it?">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#132A4C;
    --navy-deep:#0E2038;
    --ink:#16233F;
    --page-bg:#EEF2F8;
    --card:#FFFFFF;
    --clue-bg:#E9F1FB;
    --clue-border:#D2E1F4;
    --clue-num-bg:#DCEAFB;
    --teal:#1E9C86;
    --teal-dark:#0F6E5C;
    --teal-tint:#E1F5EE;
    --muted:#5B6B82;
    --success-bg:#E4F3E4;
    --success-text:#1F6D3A;
    --success-border:#BEE0C2;
    --fail-bg:#FBE9E9;
    --fail-text:#8C2A2A;
    --fail-border:#F0C6C6;
    --wrong-bg:#FBEDED;
    --wrong-text:#8C2A2A;
    --border:#E3E8F0;
    --shadow: 0 1px 3px rgba(19,42,76,0.06), 0 8px 24px rgba(19,42,76,0.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--page-bg);
    font-family:'Inter',sans-serif;
    color:var(--ink);
    min-height:100vh;
    padding-bottom:3rem;
  }
  .topbar{
    background:linear-gradient(180deg,var(--navy) 0%, var(--navy-deep) 100%);
    padding:1.1rem 1rem;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:0.6rem;
  }
  .topbar h1{
    font-family:'Lora',serif;
    font-weight:700;
    font-size:1.7rem;
    color:#fff;
    margin:0;
    letter-spacing:0.01em;
  }
  .topbar .rx-mark{
    width:32px;height:32px;border-radius:50%;
    background:var(--teal);
    display:flex;align-items:center;justify-content:center;
    font-family:'Lora',serif;font-weight:700;color:#0E2038;font-size:1.1rem;
    flex-shrink:0;
  }
  .wrap{
    max-width:620px;
    margin:0 auto;
    padding:1.75rem 1rem 0;
  }
  .tabs{
    display:flex;
    gap:0.4rem;
    justify-content:center;
    margin-bottom:1rem;
  }
  .tab-btn{
    padding:0.45rem 1.1rem;
    border-radius:20px;
    border:1.5px solid var(--border);
    background:#fff;
    color:var(--muted);
    font-weight:600;
    font-size:0.85rem;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .tab-btn.active{
    background:var(--navy);
    color:#fff;
    border-color:var(--navy);
  }
  .card{
    background:var(--card);
    border-radius:18px;
    box-shadow:var(--shadow);
    padding:1.75rem 1.5rem 2rem;
  }
  .card h2{
    font-family:'Lora',serif;
    text-align:center;
    font-size:1.5rem;
    margin:0 0 0.4rem;
    color:var(--navy);
    font-weight:600;
  }
  .subrule{
    width:52px;height:3px;background:var(--teal);
    margin:0 auto 1.3rem;
    border-radius:2px;
  }
  .daytag{
    text-align:center;
    font-size:0.78rem;
    color:var(--muted);
    margin:-0.8rem 0 1.2rem;
    font-family:'JetBrains Mono',monospace;
    letter-spacing:0.02em;
  }
  /* pill progress */
  .pillrow{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-bottom:1.4rem;
  }
  .pillseg{
    width:38px;height:16px;
    border-radius:9px;
    background:#DCE3EE;
    position:relative;
    overflow:hidden;
    border:1px solid #CBD5E4;
  }
  .pillseg::after{
    content:'';
    position:absolute;
    left:0;top:0;bottom:0;
    width:50%;
    background:rgba(255,255,255,0.55);
  }
  .pillseg.used{background:var(--teal);border-color:var(--teal-dark);}
  .pillseg.current{background:#B9D3F5;border-color:#7FAADF; box-shadow:0 0 0 3px rgba(31,156,134,0.18);}

  .clue{
    background:var(--clue-bg);
    border:1px solid var(--clue-border);
    border-radius:12px;
    padding:0.85rem 1.1rem;
    margin-bottom:0.65rem;
    font-size:0.97rem;
    line-height:1.45;
    display:flex;
    gap:0.7rem;
    align-items:flex-start;
    animation:clueFadeIn 0.5s ease;
  }
  @keyframes clueFadeIn{
    0%{ opacity:0; }
    100%{ opacity:1; }
  }
  .clue .num{
    flex-shrink:0;
    width:24px;height:24px;
    border-radius:50%;
    background:var(--clue-num-bg);
    color:var(--navy);
    font-weight:700;
    font-size:0.8rem;
    display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;
    margin-top:0.05rem;
  }
  .clue .label{
    display:block;
    font-size:0.68rem;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--teal-dark);
    font-weight:700;
    margin-bottom:0.15rem;
  }
  .clue p{margin:0;color:var(--ink);}
  .clue.revealed-after{ opacity:0.62; }

  .guessrow{
    display:flex;
    gap:0.5rem;
    margin-top:1.3rem;
    position:relative;
  }
  .combo{
    position:relative;
    flex:1;
  }
  .combo input{
    width:100%;
    padding:0.65rem 0.8rem;
    border:1.5px solid var(--border);
    border-radius:10px;
    font-size:0.95rem;
    font-family:'Inter',sans-serif;
    outline:none;
    background:#FBFCFE;
    color:var(--ink);
  }
  .combo input:focus{ border-color:var(--teal); }
  .combo input:disabled{ background:#F1F3F6; color:var(--muted); }
  .suggestions{
    position:absolute;
    top:calc(100% + 4px);
    left:0; right:0;
    background:#fff;
    border:1px solid var(--border);
    border-radius:10px;
    box-shadow:var(--shadow);
    max-height:220px;
    overflow-y:auto;
    z-index:10;
    display:none;
  }
  .suggestions.open{display:block;}
  .suggestions div{
    padding:0.55rem 0.8rem;
    font-size:0.9rem;
    cursor:pointer;
  }
  .suggestions div:hover, .suggestions div.hl{ background:var(--teal-tint); }
  .suggestions div.disabled{
    color:#B7C0CE;
    cursor:not-allowed;
    text-decoration:line-through;
  }
  .suggestions div.disabled:hover{ background:transparent; }
  .guessbtn{
    padding:0.65rem 1.15rem;
    border:none;
    border-radius:10px;
    background:var(--navy);
    color:#fff;
    font-weight:600;
    font-size:0.92rem;
    cursor:pointer;
    font-family:'Inter',sans-serif;
    white-space:nowrap;
  }
  .guessbtn:hover{ background:var(--navy-deep); }
  .guessbtn:disabled{ background:#AEB8C6; cursor:not-allowed; }

  .hint{
    font-size:0.78rem;
    color:var(--muted);
    margin-top:0.4rem;
    min-height:1.1em;
  }
  .hint.err{ color:var(--fail-text); }

  .history{
    margin-top:1.1rem;
  }
  .history-title{
    font-size:0.75rem;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--muted);
    font-weight:700;
    margin-bottom:0.5rem;
  }
  .guess-item{
    display:flex;
    align-items:center;
    gap:0.55rem;
    background:var(--wrong-bg);
    border:1px solid var(--fail-border);
    color:var(--wrong-text);
    padding:0.45rem 0.75rem;
    border-radius:8px;
    font-size:0.88rem;
    margin-bottom:0.4rem;
    font-weight:500;
  }
  .guess-item .x{
    font-weight:700;
    font-size:0.85rem;
  }

  .banner{
    margin-top:1.2rem;
    border-radius:12px;
    padding:0.95rem 1.1rem;
    text-align:center;
    font-weight:600;
    font-size:0.98rem;
  }
  .banner.win{ background:var(--success-bg); color:var(--success-text); border:1px solid var(--success-border); }
  .banner.lose{ background:var(--fail-bg); color:var(--fail-text); border:1px solid var(--fail-border); }
  .banner .sub{
    display:block;
    font-weight:400;
    font-size:0.85rem;
    margin-top:0.25rem;
    color:inherit;
    opacity:0.85;
  }

  .share-wrap{ margin-top:0.9rem; }
  .share-box{
    width:100%;
    resize:none;
    border:1px solid var(--border);
    border-radius:10px;
    padding:0.75rem;
    font-family:'JetBrains Mono',monospace;
    font-size:0.82rem;
    color:var(--ink);
    background:#FBFCFE;
    line-height:1.5;
  }
  .copybtn{
    margin-top:0.5rem;
    width:100%;
    padding:0.6rem;
    border:none;
    border-radius:10px;
    background:var(--teal);
    color:#fff;
    font-weight:600;
    font-size:0.9rem;
    cursor:pointer;
  }
  .copybtn:hover{ background:var(--teal-dark); }
  .copybtn.copied{ background:var(--teal-dark); }

  .footer-note{
    text-align:center;
    color:var(--muted);
    font-size:0.76rem;
    margin-top:1rem;
  }

  /* Archive */
  .archive-list{
    display:flex;
    flex-direction:column;
    gap:0.5rem;
    max-height:420px;
    overflow-y:auto;
  }
  .archive-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0.7rem 0.95rem;
    border:1px solid var(--border);
    border-radius:10px;
    cursor:pointer;
    background:#FBFCFE;
  }
  .archive-item:hover{ border-color:var(--teal); }
  .archive-item .adate{
    font-weight:600;
    font-size:0.9rem;
    color:var(--ink);
  }
  .archive-item .astatus{
    font-size:0.75rem;
    font-weight:700;
    padding:0.2rem 0.6rem;
    border-radius:20px;
  }
  .astatus.solved{ background:var(--success-bg); color:var(--success-text); }
  .astatus.failed{ background:var(--fail-bg); color:var(--fail-text); }
  .astatus.unplayed{ background:#EEF1F6; color:var(--muted); }

  /* Modal */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(14,32,56,0.55);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:1rem;
  }
  .modal-overlay.open{ display:flex; }
  .modal-box{
    background:#fff;
    border-radius:18px;
    max-width:420px;
    width:100%;
    padding:1.8rem 1.6rem 1.6rem;
    box-shadow:0 20px 60px rgba(14,32,56,0.35);
    text-align:center;
    animation:popIn 0.25s ease;
    position:relative;
    max-height:85vh;
    overflow-y:auto;
  }
  @keyframes popIn{ from{ opacity:0; transform:scale(0.92); } to{ opacity:1; transform:scale(1); } }
  .modal-box .modal-icon{
    width:56px;height:56px;
    border-radius:50%;
    margin:0 auto 0.8rem;
    display:flex;align-items:center;justify-content:center;
    font-size:1.6rem;
  }
  .modal-box.win .modal-icon{ background:var(--success-bg); color:var(--success-text); }
  .modal-box.lose .modal-icon{ background:var(--fail-bg); color:var(--fail-text); }
  .modal-box h3{
    font-family:'Lora',serif;
    font-size:1.3rem;
    margin:0 0 0.35rem;
    color:var(--navy);
  }
  .modal-box p{
    font-size:0.92rem;
    color:var(--muted);
    margin:0 0 0.9rem;
  }
  .modal-close{
    position:absolute;
    top:0.8rem; right:0.9rem;
    background:none;
    border:none;
    font-size:1.1rem;
    color:var(--muted);
    cursor:pointer;
    line-height:1;
  }
  .modal-continue{
    margin-top:0.9rem;
    width:100%;
    padding:0.6rem;
    border:none;
    border-radius:10px;
    background:var(--navy);
    color:#fff;
    font-weight:600;
    font-size:0.9rem;
    cursor:pointer;
  }
  .modal-continue:hover{ background:var(--navy-deep); }

  /* Challenge mode toggle */
  .challenge-toggle{
    display:flex;
    align-items:center;
    gap:0.5rem;
    justify-content:center;
    font-size:0.8rem;
    color:var(--muted);
    margin:-0.6rem 0 1.1rem;
    cursor:pointer;
    user-select:none;
  }
  .challenge-toggle input{ accent-color: var(--teal); width:15px; height:15px; cursor:pointer; }

  /* Guess history: close/"almost" (same class) tag */
  .guess-item.close{
    background:#FFF3B0;
    border-color:#E8C547;
    color:#7A5B00;
    font-weight:600;
  }
  .guess-item.close .x{ filter:none; }
  .guess-item .tag{
    margin-left:auto;
    font-size:0.68rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.03em;
    background:rgba(0,0,0,0.1);
    padding:0.15rem 0.45rem;
    border-radius:20px;
  }

  /* Learn more */
  .learnmore-btn{
    margin-top:0.9rem;
    width:100%;
    padding:0.6rem;
    border:1.5px solid var(--teal);
    border-radius:10px;
    background:#fff;
    color:var(--teal-dark);
    font-weight:600;
    font-size:0.88rem;
    cursor:pointer;
  }
  .learnmore-btn:hover{ background:var(--teal-tint); }

  /* Practice mode */
  .practice-controls{
    margin-top:0.9rem;
    text-align:center;
  }
  .practice-note{
    font-size:0.8rem;
    color:var(--muted);
    margin:0 0 0.6rem;
  }
  .practice-btn{
    width:100%;
    padding:0.6rem;
    border:1.5px solid var(--navy);
    border-radius:10px;
    background:#fff;
    color:var(--navy);
    font-weight:600;
    font-size:0.88rem;
    cursor:pointer;
  }
  .practice-btn:hover{ background:#EEF2F8; }
  .learnmore-body{
    margin-top:0.7rem;
    background:var(--clue-bg);
    border:1px solid var(--clue-border);
    border-radius:12px;
    padding:0.9rem 1.05rem;
    font-size:0.9rem;
    line-height:1.55;
    color:var(--ink);
    animation:clueFadeIn 0.4s ease;
  }

  /* Toast */
  .toast{
    position:fixed;
    top:16px;
    left:50%;
    transform:translateX(-50%) translateY(-30px);
    background:var(--navy);
    color:#fff;
    padding:0.7rem 1.1rem;
    border-radius:10px;
    font-size:0.88rem;
    font-weight:600;
    box-shadow:0 10px 30px rgba(14,32,56,0.3);
    z-index:200;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.25s ease, transform 0.25s ease;
    max-width:90vw;
    text-align:center;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
  .toast.close-toast{ background:#B8860B; }
  .toast.level-toast{ background:var(--teal-dark); }

  /* Confetti */
  .confetti-container{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:150;
    overflow:hidden;
  }
  .confetti-piece{
    position:absolute;
    top:-20px;
    border-radius:2px;
    animation-name:confettiFall;
    animation-timing-function:cubic-bezier(0.4,0.1,0.6,1);
    animation-fill-mode:forwards;
  }
  @keyframes confettiFall{
    0%{ transform:translateY(0) rotate(0deg); opacity:1; }
    100%{ transform:translateY(110vh) rotate(540deg); opacity:0.2; }
  }
  .pillbottle-pop{
    position:fixed;
    left:50%; top:16%;
    transform:translate(-50%,-50%) scale(0);
    z-index:151;
    pointer-events:none;
    animation:pillPop 2s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes pillPop{
    0%{ transform:translate(-50%,-50%) scale(0) rotate(0deg); opacity:0; }
    20%{ transform:translate(-50%,-50%) scale(1.15) rotate(-8deg); opacity:1; }
    30%{ transform:translate(-50%,-50%) scale(0.95) rotate(4deg); opacity:1; }
    38%{ transform:translate(-50%,-50%) scale(1.05) rotate(-2deg); opacity:1; }
    45%{ transform:translate(-50%,-50%) scale(1) rotate(0deg); opacity:1; }
    85%{ transform:translate(-50%,-50%) scale(1) rotate(0deg); opacity:1; }
    100%{ transform:translate(-50%,-50%) scale(1) rotate(0deg); opacity:0; }
  }

  /* Stats panel */
  .stats-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:0.7rem;
    margin-bottom:1.1rem;
  }
  .stat-card{
    background:var(--clue-bg);
    border:1px solid var(--clue-border);
    border-radius:12px;
    padding:0.85rem 0.9rem;
    text-align:center;
  }
  .stat-card .val{
    font-family:'Lora',serif;
    font-size:1.6rem;
    font-weight:700;
    color:var(--navy);
    line-height:1.1;
  }
  .stat-card .lbl{
    font-size:0.72rem;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:0.04em;
    margin-top:0.25rem;
  }
  .xp-block{
    background:#fff;
    border:1px solid var(--border);
    border-radius:12px;
    padding:0.95rem 1.05rem;
  }
  .xp-block .xp-top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:0.5rem;
  }
  .xp-block .xp-level{
    font-family:'Lora',serif;
    font-weight:700;
    color:var(--navy);
    font-size:1.05rem;
  }
  .xp-block .xp-count{
    font-size:0.75rem;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
  }
  .xp-bar-track{
    width:100%;
    height:10px;
    background:#E7ECF3;
    border-radius:6px;
    overflow:hidden;
  }
  .xp-bar-fill{
    height:100%;
    background:linear-gradient(90deg, var(--teal), var(--teal-dark));
    border-radius:6px;
    transition:width 0.5s ease;
  }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background:#CBD5E4; border-radius:4px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="rx-mark">℞</div>
  <h1>Rxordle</h1>
</div>

<div class="wrap">
  <div class="tabs">
    <button class="tab-btn active" id="tabToday">Today</button>
    <button class="tab-btn" id="tabArchive">Archive</button>
    <button class="tab-btn" id="tabStats">Stats</button>
  </div>

  <div class="card" id="gameCard">
    <h2 id="cardTitle">What's the medication?</h2>
    <div class="subrule"></div>
    <div class="daytag" id="daytag"></div>

    <label class="challenge-toggle">
      <input type="checkbox" id="challengeToggle" />
      <span>Challenge mode (no autocomplete)</span>
    </label>

    <div class="pillrow" id="pillrow"></div>

    <div id="clues"></div>

    <div class="guessrow" id="guessrow">
      <div class="combo">
        <input type="text" id="guessInput" placeholder="Start typing a medication..." autocomplete="off" />
        <div class="suggestions" id="suggestions"></div>
      </div>
      <button class="guessbtn" id="guessBtn">Guess</button>
    </div>
    <div class="hint" id="hintText"></div>

    <div class="history" id="historyWrap" style="display:none;">
      <div class="history-title">Previous guesses</div>
      <div id="historyList"></div>
    </div>

function getBrand(name){ return BRAND_MAP[name] || null; }
function displayName(name){
  const brand = getBrand(name);
  return brand ? (name + ' (' + brand + ')') : name;
}
function findDrug(name){
  const low = name.trim().toLowerCase();
  return DRUGS.find(d => d.name.toLowerCase() === low || (getBrand(d.name) || '').toLowerCase() === low);
}

// ---------- Storage helper: uses Claude's window.storage when available,
// falls back to localStorage when this file is hosted as a plain website.
// IMPORTANT: availability is checked fresh on every call (not cached at script
// load) because window.storage can be injected into the page slightly after
// this script first runs -- caching it early would silently break persistence. ----------
const storageAdapter = {
  async get(key){
    if(typeof window !== 'undefined' && window.storage){
      try{ const r = await window.storage.get(key, false); return r ? r.value : null; }
      catch(e){ /* key may not exist yet, or storage unavailable this call */ }
    }
    try{ return window.localStorage.getItem(key); } catch(e){ return null; }
  },
  async set(key, value){
    if(typeof window !== 'undefined' && window.storage){
      try{ await window.storage.set(key, value, false); return true; }
      catch(e){ /* fall through to localStorage as a backup */ }
    }
    try{ window.localStorage.setItem(key, value); return true; } catch(e){ return false; }
  }
};

// ---------- Date helpers ----------
function fmtDate(d){
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function todayStr(){ return fmtDate(new Date()); }
function hashStr(s){
  let h = 0;
  for(let i=0;i<s.length;i++){ h = (h<<5) - h + s.charCodeAt(i); h |= 0; }
  return Math.abs(h);
}
function drugForDate(dateStr){
  const overrideName = DATE_OVERRIDES[dateStr];
  if(overrideName){
    const override = DRUGS.find(d => d.name === overrideName);
    if(override) return override;
  }
  const idx = hashStr(dateStr) % DRUGS.length;
  return DRUGS[idx];
}
// Manual overrides for specific dates, e.g. to avoid a repeat or swap in a
// different therapeutic area. Keys are 'YYYY-MM-DD', values must exactly
// match a drug's "name" field in the DRUGS array.
const DATE_OVERRIDES = {
  '2026-07-07': 'Furosemide'
};
const TODAY = todayStr();
const ARCHIVE_DAYS = 30; // how many past days to list in the archive

// ---------- Active game context ----------
let ctx = {
  date: TODAY,
  drug: drugForDate(TODAY),
  state: { date: TODAY, guesses: [], status: 'playing' },
  practice: false,
  practiceState: null
};

function storageKeyFor(dateStr){ return 'rxordle-state-' + dateStr; }

async function loadGame(dateStr){
  ctx.date = dateStr;
  ctx.drug = drugForDate(dateStr);
  ctx.state = { date: dateStr, guesses: [], status: 'playing', statsRecorded: false };
  ctx.practice = false;
  ctx.practiceState = null;
  const raw = await storageAdapter.get(storageKeyFor(dateStr));
  if(raw){
    try{
      const parsed = JSON.parse(raw);
      if(parsed && parsed.date === dateStr){
        // migrate legacy guesses (plain strings) to {name, close} objects
        if(Array.isArray(parsed.guesses)){
          parsed.guesses = parsed.guesses.map(g => typeof g === 'string' ? { name: g, close: false } : g);
        }
        if(typeof parsed.statsRecorded !== 'boolean') parsed.statsRecorded = (parsed.status !== 'playing');
        ctx.state = parsed;
      }
    }catch(e){ /* ignore corrupt state */ }
  }
  render();
}
async function saveGame(){
  await storageAdapter.set(storageKeyFor(ctx.date), JSON.stringify(ctx.state));
}

// ---------- Stats & XP ----------
const STATS_KEY = 'rxordle-global-stats';
// XP required grows each level instead of staying flat: level 1->2 costs 100 XP,
// 2->3 costs 200, 3->4 costs 300, and so on (100 more per level).
const XP_LEVEL_STEP = 100;
async function loadStats(){
  const raw = await storageAdapter.get(STATS_KEY);
  let stats = { played:0, wins:0, currentStreak:0, bestStreak:0, totalCluesOnWin:0, totalXP:0 };
  if(raw){
    try{ stats = Object.assign(stats, JSON.parse(raw)); }catch(e){}
  }
  return stats;
}
async function saveStats(stats){
  await storageAdapter.set(STATS_KEY, JSON.stringify(stats));
}
// Cumulative XP required to REACH a given level (level 1 starts at 0 XP).
function xpForLevel(level){
  return XP_LEVEL_STEP * (level - 1) * level / 2;
}
function levelFromXP(xp){
  let level = 1;
  while(xpForLevel(level + 1) <= xp) level++;
  return level;
}

// Serializes stats read-modify-write so two completions in quick succession
// (e.g. finishing today's puzzle then immediately an archive puzzle) can't
// race and silently drop one of the updates.
let statsLock = Promise.resolve();
function withStatsLock(fn){
  const run = statsLock.then(fn, fn);
  statsLock = run.catch(() => {});
  return run;
}

// Records a completed round exactly once per date (guarded by ctx.state.statsRecorded)
async function recordCompletion(won, usedClues){
  if(ctx.state.statsRecorded) return null;
  ctx.state.statsRecorded = true;
  await saveGame();

  return withStatsLock(async () => {
    const stats = await loadStats();
    const prevLevel = levelFromXP(stats.totalXP);
    stats.played += 1;
    if(won){
      stats.wins += 1;
      stats.currentStreak += 1;
      stats.bestStreak = Math.max(stats.bestStreak, stats.currentStreak);
      stats.totalCluesOnWin += usedClues;
      stats.totalXP += Math.max(20, (7 - usedClues) * 20);
    } else {
      stats.currentStreak = 0;
      stats.totalXP += 10; // participation XP
    }
    const newLevel = levelFromXP(stats.totalXP);
    await saveStats(stats);
    return { stats, leveledUp: newLevel > prevLevel, newLevel };
  });
}

// ---------- Practice mode ----------
// Lets a player replay a puzzle they've already finished without touching the
// real saved result, stats, streak, or XP for that date. Practice guesses live
// only in memory (ctx.practiceState) and are discarded on reload or tab switch.
function activeState(){
  return ctx.practice ? ctx.practiceState : ctx.state;
}
function startPractice(){
  ctx.practice = true;
  ctx.practiceState = { guesses: [], status: 'playing' };
  render();
}
function exitPractice(){
  ctx.practice = false;
  ctx.practiceState = null;
  render();
}

  void toastEl.offsetWidth;
  toastEl.className = 'toast show' + (type ? (' ' + type) : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toastEl.classList.remove('show'); }, 3200);
}

function celebrateWin(){
  const colors = ['#1E9C86','#132A4C','#F4C542','#E8604C','#5AA9E6'];
  const count = 60;
  for(let i=0;i<count;i++){
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const size = 6 + Math.random()*6;
    piece.style.width = size + 'px';
    piece.style.height = (size*0.4) + 'px';
    piece.style.left = (Math.random()*100) + 'vw';
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    const duration = 1.6 + Math.random()*1.2;
    piece.style.animationDuration = duration + 's';
    piece.style.animationDelay = (Math.random()*0.3) + 's';
    confettiContainer.appendChild(piece);
    setTimeout(() => piece.remove(), (duration+0.5)*1000);
  }
  const bottle = document.createElement('div');
  bottle.className = 'pillbottle-pop';
  bottle.innerHTML = '\u{1F48A}';
  bottle.style.fontSize = '4rem';
  confettiContainer.appendChild(bottle);
  setTimeout(() => bottle.remove(), 2100);
  playWinSound();
}

  try{
    const audio = new Audio(LOSE_SOUND_DATA_URI);
    audio.volume = 0.7;
    audio.play().catch(() => { /* autoplay may be blocked until user interacts; safe to ignore */ });
  }catch(e){ /* audio not available */ }
}
function playAlmostSound(){
  try{
    const audio = new Audio(ALMOST_SOUND_DATA_URI);
    audio.volume = 0.7;
    audio.play().catch(() => { /* autoplay may be blocked until user interacts; safe to ignore */ });
  }catch(e){ /* audio not available */ }
}

// ---------- Learn more (synthesized educational summary) ----------
function buildLearnMoreParagraph(drug){
  const brand = getBrand(drug.name);
  const nameStr = brand ? drug.name + ' (' + brand + ')' : drug.name;
  const c = drug.clues; // [patient, class, mechanism, sideEffect, keyFact, reveal]
  let p = nameStr + ' is ' + (/^[aeiouAEIOU]/.test(drug.cls) ? 'an ' : 'a ') + drug.cls.toLowerCase() + '. ';
  p += c[0] + ' ' + c[2] + ' ' + c[3] + ' ' + c[4];
  return p;
}

// Each drug's raw clues are authored in this order: [patient, class, mechanism, sideEffect, keyFact, reveal]
// CLUE_ORDER controls the order they're actually shown to the player, from vaguest to most specific.
// Class was tried as clue 1 but proved too identifying too early (with several classes only
// having one member in the pool, naming it basically gives the answer away). It's now pushed
// to slot 4, after side effect, patient, and mechanism have already been shown.
const CLUE_ORDER = [3, 0, 2, 1, 4, 5];
const labels = ["Side effect", "Patient", "Mechanism", "Class", "Key fact", "Reveal"];

function cluesShown(){
  return Math.min(6, Math.max(1, activeState().guesses.length + 1));
}

function formatDayLabel(dateStr){
  return new Date(dateStr+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
}

function render(){
  const isToday = ctx.date === TODAY;
  cardTitle.textContent = isToday ? "What's the medication?" : "What's the medication?";
  daytag.textContent = (isToday ? 'Today · ' : '') + formatDayLabel(ctx.date) + (ctx.practice ? ' \u00b7 Practice round' : '');
  footerNote.textContent = isToday
    ? 'New medication every day at midnight, local time.'
    : 'Playing an archived puzzle from ' + formatDayLabel(ctx.date) + '.';

  const st = activeState();
  const roundOver = st.status !== 'playing';
  const shown = roundOver ? 6 : cluesShown();

  pillrowEl.innerHTML = '';
  for(let i=0;i<6;i++){
    const seg = document.createElement('div');
    seg.className = 'pillseg';
    if(i < shown - 1 || roundOver) seg.classList.add('used');
    else if(i === shown - 1) seg.classList.add('current','used');
    pillrowEl.appendChild(seg);
  }

  const cluesUsedCount = roundOver ? Math.min(6, Math.max(st.guesses.length + (st.status==='won'?1:0), 1)) : shown;
  cluesEl.innerHTML = '';
  for(let i=0;i<shown;i++){
    const div = document.createElement('div');
    div.className = 'clue' + (roundOver && i >= cluesUsedCount ? ' revealed-after' : '');
    div.innerHTML = '<div class="num">'+(i+1)+'</div><div><span class="label">'+labels[i]+'</span><p>'+ctx.drug.clues[CLUE_ORDER[i]]+'</p></div>';
    cluesEl.appendChild(div);
  }

  if(st.guesses.length > 0){
    historyWrap.style.display = 'block';
    historyList.innerHTML = '';
    st.guesses.forEach(g => {
      const gName = (typeof g === 'string') ? g : g.name;
      const gClose = (typeof g === 'object' && g.close);
      const item = document.createElement('div');
      item.className = 'guess-item' + (gClose ? ' close' : '');
      item.innerHTML = '<span class="x">'+(gClose ? '\u{1F3AF}' : '\u2715')+'</span><span>'+displayName(gName)+'</span>' + (gClose ? '<span class="tag">Almost!</span>' : '');
      historyList.appendChild(item);
    });
  } else {
    historyWrap.style.display = 'none';
  }

  bannerWrap.innerHTML = '';
  learnMoreWrap.innerHTML = '';
  guessInput.value = '';
  if(st.status === 'won'){
    guessrow.style.display = 'none';
    hintText.textContent = '';
    const usedClues = Math.min(6, st.guesses.length + 1);
    const banner = document.createElement('div');
    banner.className = 'banner win';
    banner.innerHTML = (ctx.practice ? "<strong>Practice round</strong> \u2014 it's " : "You got it! It's ")+"<strong>"+displayName(ctx.drug.name)+"</strong> ("+ctx.drug.cls+").<span class='sub'>Solved in "+usedClues+" of 6 clues.</span>";
    bannerWrap.appendChild(banner);
    if(!ctx.practice) bannerWrap.appendChild(buildShareBox(usedClues, true));
    bannerWrap.appendChild(buildPracticeControls());
    learnMoreWrap.appendChild(buildLearnMoreBlock());
  } else if(st.status === 'lost'){
    guessrow.style.display = 'none';
    hintText.textContent = '';
    const banner = document.createElement('div');
    banner.className = 'banner lose';
    banner.innerHTML = (ctx.practice ? "<strong>Practice round</strong> \u2014 out of clues. " : "Out of clues. ")+"The answer was <strong>"+displayName(ctx.drug.name)+"</strong> ("+ctx.drug.cls+").";
    bannerWrap.appendChild(banner);
    if(!ctx.practice) bannerWrap.appendChild(buildShareBox(6, false));
    bannerWrap.appendChild(buildPracticeControls());
    learnMoreWrap.appendChild(buildLearnMoreBlock());
  } else {
    guessrow.style.display = 'flex';
  }
}

function buildPracticeControls(){
  const wrap = document.createElement('div');
  wrap.className = 'practice-controls';
  if(ctx.practice){
    const note = document.createElement('p');
    note.className = 'practice-note';
    note.textContent = "Practice round \u2014 this doesn't affect your saved result, streak, or stats.";
    const backBtn = document.createElement('button');
    backBtn.className = 'practice-btn';
    backBtn.textContent = '\u2190 Back to results';
    backBtn.onclick = exitPractice;
    wrap.appendChild(note);
    wrap.appendChild(backBtn);
  } else {
    const replayBtn = document.createElement('button');
    replayBtn.className = 'practice-btn';
    replayBtn.textContent = '\u{1F501} Play again (practice)';
    replayBtn.onclick = startPractice;
    wrap.appendChild(replayBtn);
  }
  return wrap;
}

function buildLearnMoreBlock(){
  const wrap = document.createElement('div');
  const btn = document.createElement('button');
  btn.className = 'learnmore-btn';
  btn.textContent = 'Learn more about this medication';
  let open = false;
  const body = document.createElement('div');
  body.className = 'learnmore-body';
  body.style.display = 'none';
  body.textContent = buildLearnMoreParagraph(ctx.drug);
  btn.onclick = () => {
    open = !open;
    body.style.display = open ? 'block' : 'none';
    btn.textContent = open ? 'Hide details' : 'Learn more about this medication';
  };
  wrap.appendChild(btn);
  wrap.appendChild(body);
  return wrap;
}

function shareText(dateStr, usedClues, won){
  let squares = '';
  const guesses = ctx.state.guesses || [];
  for(let i=0;i<6;i++){
    if(i < usedClues - 1){
      const g = guesses[i];
      const isClose = g && typeof g === 'object' && g.close;
      squares += isClose ? '\ud83d\udfe8' : '\ud83d\udfe5';
    }
    else if(i === usedClues - 1) squares += (won ? '\ud83d\udfe9' : '\u274c');
    else squares += '\u2b1c';
  }
  const scoreLine = won ? (usedClues+'/6') : 'X/6';
  return 'https://rxordle.org/\n\ud83d\udc8a Rxordle '+dateStr+' - '+scoreLine+'\n'+squares+'\nCan you name the medication?';
}

function buildShareBox(usedClues, won){
  const wrapDiv = document.createElement('div');
  wrapDiv.className = 'share-wrap';
  const text = shareText(ctx.date, usedClues, won);
  const textarea = document.createElement('textarea');
  textarea.className = 'share-box';
  textarea.rows = 4;
  textarea.readOnly = true;
  textarea.value = text;
  const btn = document.createElement('button');
  btn.className = 'copybtn';
  btn.textContent = 'Copy to share';

  const showCopied = () => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='Copy to share'; btn.classList.remove('copied'); }, 1800);
  };
  const showFailed = () => {
    btn.textContent = 'Tap the text above to select it';
    setTimeout(()=>{ btn.textContent='Copy to share'; }, 2200);
  };
  const fallbackCopy = () => {
    try{
      textarea.removeAttribute('readonly');
      textarea.focus();
      textarea.select();
      textarea.setSelectionRange(0, text.length); // needed on iOS Safari
      const ok = document.execCommand('copy');
      textarea.setAttribute('readonly', '');
      if(ok) showCopied(); else showFailed();
    }catch(e){
      showFailed();
    }
  };

  btn.onclick = () => {
    // navigator.clipboard can be entirely absent (insecure context, older
    // browser, some embedded/sandboxed views) -- calling .writeText on
    // undefined would throw synchronously and skip the .catch() below,
    // so check for it explicitly before ever touching it.
    if(window.isSecureContext && navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(showCopied).catch(fallbackCopy);
    } else {
      fallbackCopy();
    }
  };
  wrapDiv.appendChild(textarea);
  wrapDiv.appendChild(btn);
  return wrapDiv;
}

// ---------- Result modal ----------
async function showResultModal(won){
  const st = activeState();
  const usedClues = won ? Math.min(6, st.guesses.length + 1) : 6;
  modalBox.className = 'modal-box ' + (won ? 'win' : 'lose');
  modalIcon.textContent = won ? '\u2713' : '\u2717';
  modalTitle.textContent = (won ? 'Correct!' : 'Out of clues') + (ctx.practice ? ' (Practice)' : '');
  modalSub.textContent = won
    ? "It's " + displayName(ctx.drug.name) + " (" + ctx.drug.cls + "). Solved in " + usedClues + " of 6 clues."
    : "The answer was " + displayName(ctx.drug.name) + " (" + ctx.drug.cls + ").";
  modalShareWrap.innerHTML = '';
  if(ctx.practice){
    const note = document.createElement('p');
    note.className = 'practice-note';
    note.style.marginTop = '0.4rem';
    note.textContent = "This was a practice round \u2014 it doesn't affect your saved result, streak, or stats.";
    modalShareWrap.appendChild(note);
  } else {
    modalShareWrap.appendChild(buildShareBox(usedClues, won));
  }
  modalLearnMoreWrap.innerHTML = '';
  modalLearnMoreWrap.appendChild(buildLearnMoreBlock());
  modalOverlay.classList.add('open');

  if(won){ celebrateWin(); } else { playLoseSound(); }

  if(!ctx.practice){
    const result = await recordCompletion(won, usedClues);
    if(result && result.leveledUp){
      setTimeout(() => showToast('\u2728 Level up! You reached level ' + result.newLevel, 'level-toast'), won ? 900 : 300);
    }
  }
}
function hideModal(){ modalOverlay.classList.remove('open'); }
modalClose.addEventListener('click', hideModal);
modalContinue.addEventListener('click', hideModal);
modalOverlay.addEventListener('click', (e) => { if(e.target === modalOverlay) hideModal(); });

// ---------- Autocomplete ----------
let activeIndex = -1;
let challengeMode = false;

challengeToggle.addEventListener('change', () => {
  challengeMode = challengeToggle.checked;
  suggestions.classList.remove('open');
  suggestions.innerHTML = '';
  storageAdapter.set('rxordle-challenge-mode', challengeMode ? '1' : '0');
  guessInput.placeholder = challengeMode ? 'Type the full medication name...' : 'Start typing a medication...';
});
(async () => {
  const saved = await storageAdapter.get('rxordle-challenge-mode');
  if(saved === '1'){
    challengeMode = true;
    challengeToggle.checked = true;
    guessInput.placeholder = 'Type the full medication name...';
  }
})();

guessInput.addEventListener('input', () => {
  hintText.textContent = '';
  hintText.classList.remove('err');
  const q = guessInput.value.trim().toLowerCase();
  if(challengeMode || !q){ suggestions.classList.remove('open'); suggestions.innerHTML=''; return; }
  const matches = DRUG_NAMES.filter(n => {
    const brand = getBrand(n);
    return n.toLowerCase().includes(q) || (brand && brand.toLowerCase().includes(q));
  }).slice(0, 8);
  activeIndex = -1;
  if(matches.length === 0){
    suggestions.classList.remove('open');
    suggestions.innerHTML = '';
    return;
  }
  suggestions.innerHTML = '';
  matches.forEach((n) => {
    const div = document.createElement('div');
    div.textContent = n;
    div.dataset.generic = n;
    const alreadyTried = activeState().guesses.some(g => (typeof g === 'string' ? g : g.name).toLowerCase() === n.toLowerCase());
    if(alreadyTried){
      div.classList.add('disabled');
      div.title = 'Already guessed';
    } else {
      div.onclick = () => {
        guessInput.value = n;
        suggestions.classList.remove('open');
        suggestions.innerHTML = '';
        guessInput.focus();
      };
    }
    suggestions.appendChild(div);
  });
  suggestions.classList.add('open');
});

guessInput.addEventListener('keydown', (e) => {
  if(!suggestions.classList.contains('open')) {
    if(e.key === 'Enter'){ submitGuess(); }
    return;
  }
  const items = Array.from(suggestions.children).filter(it => !it.classList.contains('disabled'));
  if(e.key === 'ArrowDown'){
    e.preventDefault();
    activeIndex = Math.min(items.length-1, activeIndex+1);
    updateHl(items);
  } else if(e.key === 'ArrowUp'){
    e.preventDefault();
    activeIndex = Math.max(0, activeIndex-1);
    updateHl(items);
  } else if(e.key === 'Enter'){
    e.preventDefault();
    if(activeIndex >= 0 && items[activeIndex]){
      guessInput.value = items[activeIndex].dataset.generic || items[activeIndex].textContent;
      suggestions.classList.remove('open');
      suggestions.innerHTML = '';
    }
    submitGuess();
  } else if(e.key === 'Escape'){
    suggestions.classList.remove('open');
    suggestions.innerHTML = '';
  }
});
function updateHl(items){
  items.forEach((it,i) => it.classList.toggle('hl', i===activeIndex));
  if(items[activeIndex]) items[activeIndex].scrollIntoView({block:'nearest'});
}

document.addEventListener('click', (e) => {
  if(!e.target.closest('.combo')){
    suggestions.classList.remove('open');
    suggestions.innerHTML = '';
  }
});

guessBtn.addEventListener('click', submitGuess);

function submitGuess(){
  const st = activeState();
  if(st.status !== 'playing') return;
  const raw = guessInput.value.trim();
  if(!raw){ return; }
  const matchDrug = findDrug(raw);
  if(!matchDrug){
    hintText.textContent = challengeMode
      ? 'No medication in the list matches that spelling. Check it and try again.'
      : 'Select a medication from the list to guess.';
    hintText.classList.add('err');
    return;
  }
  const match = matchDrug.name;
  if(st.guesses.some(g => (typeof g === 'string' ? g : g.name).toLowerCase() === match.toLowerCase())){
    hintText.textContent = 'You already tried that one.';
    hintText.classList.add('err');
    return;
  }
  hintText.textContent = '';
  hintText.classList.remove('err');

  let justFinished = null;
  if(match.toLowerCase() === ctx.drug.name.toLowerCase()){
    st.status = 'won';
    justFinished = true;
  } else {
    const isClose = matchDrug.cls === ctx.drug.cls;
    st.guesses.push({ name: match, close: isClose });
    if(isClose){
      showToast('\u{1F914} Close! Same drug class, wrong medication. Keep going.', 'close-toast');
      playAlmostSound();
    }
    if(st.guesses.length >= 6){
      st.status = 'lost';
      justFinished = false;
    }
  }
  guessInput.value = '';
  suggestions.classList.remove('open');
  suggestions.innerHTML = '';
  if(!ctx.practice) saveGame();
  render();
  if(justFinished !== null){
    showResultModal(justFinished);
  }
}

// ---------- Tabs ----------
function setActiveTab(tab){
  tabToday.classList.toggle('active', tab === 'today');
  tabArchive.classList.toggle('active', tab === 'archive');
  tabStats.classList.toggle('active', tab === 'stats');
  gameCard.style.display = tab === 'today' ? 'block' : 'none';
  archiveCard.style.display = tab === 'archive' ? 'block' : 'none';
  statsCard.style.display = tab === 'stats' ? 'block' : 'none';
}
tabToday.addEventListener('click', () => {
  setActiveTab('today');
  loadGame(TODAY);
});
tabArchive.addEventListener('click', () => {
  setActiveTab('archive');
  renderArchiveList();
});
tabStats.addEventListener('click', () => {
  setActiveTab('stats');
  renderStatsPanel();
});

async function renderStatsPanel(){
  const stats = await loadStats();
  const winPct = stats.played > 0 ? Math.round((stats.wins / stats.played) * 100) : 0;
  const avgClues = stats.wins > 0 ? (stats.totalCluesOnWin / stats.wins).toFixed(1) : 'N/A';
  const level = levelFromXP(stats.totalXP);
  const xpAtLevelStart = xpForLevel(level);
  const xpNeededThisLevel = xpForLevel(level + 1) - xpAtLevelStart;
  const xpIntoLevel = stats.totalXP - xpAtLevelStart;
  const xpPct = Math.round((xpIntoLevel / xpNeededThisLevel) * 100);

  statsPanel.innerHTML = '';

  const xpBlock = document.createElement('div');
  xpBlock.className = 'xp-block';
  xpBlock.style.marginBottom = '1.1rem';
  xpBlock.innerHTML =
    '<div class="xp-top"><span class="xp-level">Level ' + level + '</span>' +
    '<span class="xp-count">' + xpIntoLevel + ' / ' + xpNeededThisLevel + ' XP</span></div>' +
    '<div class="xp-bar-track"><div class="xp-bar-fill" style="width:' + xpPct + '%;"></div></div>';
  statsPanel.appendChild(xpBlock);

  const grid = document.createElement('div');
  grid.className = 'stats-grid';
  const cards = [
    { val: stats.played, lbl: 'Games played' },
    { val: winPct + '%', lbl: 'Win rate' },
    { val: stats.currentStreak, lbl: 'Current streak' },
    { val: stats.bestStreak, lbl: 'Best streak' },
    { val: avgClues, lbl: 'Avg. clues to solve' },
    { val: stats.totalXP, lbl: 'Total XP' }
  ];
  cards.forEach(c => {
    const card = document.createElement('div');
    card.className = 'stat-card';
    card.innerHTML = '<div class="val">'+c.val+'</div><div class="lbl">'+c.lbl+'</div>';
    grid.appendChild(card);
  });
  statsPanel.appendChild(grid);
}

async function renderArchiveList(){
  archiveList.innerHTML = '<div style="text-align:center; color:var(--muted); font-size:0.85rem; padding:1rem;">Loading past puzzles...</div>';
  const items = [];
  for(let i=1;i<=ARCHIVE_DAYS;i++){
    const d = new Date();
    d.setDate(d.getDate() - i);
    items.push(fmtDate(d));
  }
  const rows = await Promise.all(items.map(async (dateStr) => {
    const raw = await storageAdapter.get(storageKeyFor(dateStr));
    let status = 'unplayed';
    let label = 'Not played';
    if(raw){
      try{
        const parsed = JSON.parse(raw);
        if(parsed.status === 'won'){
          const used = Math.min(6, (parsed.guesses ? parsed.guesses.length : 0) + 1);
          status = 'solved';
          label = 'Completed in ' + used + (used === 1 ? ' guess' : ' guesses');
        }
        else if(parsed.status === 'lost'){ status = 'failed'; label = 'Failed (6/6)'; }
        else { status = 'unplayed'; label = 'In progress'; }
      }catch(e){}
    }
    return { dateStr, status, label };
  }));

  archiveList.innerHTML = '';
  rows.forEach(row => {
    const div = document.createElement('div');
    div.className = 'archive-item';
    div.innerHTML = '<span class="adate">'+formatDayLabel(row.dateStr)+'</span><span class="astatus '+row.status+'">'+row.label+'</span>';
    div.addEventListener('click', () => {
      setActiveTab('today');
      loadGame(row.dateStr);
    });
    archiveList.appendChild(div);
  });
}
